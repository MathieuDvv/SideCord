name: Publish plugin catalog

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: plugin-catalog-pages
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install catalog signer
        run: python -m pip install "cryptography>=45,<47"
      - name: Discover, validate, and sign plugins
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SIDECORD_CATALOG_SIGNING_KEY: ${{ secrets.SIDECORD_CATALOG_SIGNING_KEY }}
          SIDECORD_VERIFIED_PUBLISHERS: ${{ vars.SIDECORD_VERIFIED_PUBLISHERS }}
        run: python scripts/build_plugin_catalog.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy catalog to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
