name: SideCord
options:
  bundleIdPrefix: com.sidecord
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 6
    MARKETING_VERSION: 2.5.0
    SIDECORD_MARKETPLACE_CATALOG_URL: https://mathieudvv.github.io/SideCord/catalog.json
    SIDECORD_MARKETPLACE_PUBLIC_KEY: ""
    PRODUCT_NAME: SideCord
targets:
  SideCord:
    type: application
    platform: macOS
    info:
      path: SideCord/Info.plist
      properties:
        CFBundleDisplayName: SideCord
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.social-networking
        LSUIElement: true
        NSHighResolutionCapable: true
        NSCameraUsageDescription: SideCord uses the camera only when you start or join a Discord video call.
        NSMicrophoneUsageDescription: SideCord uses the microphone only when you start or join a Discord voice call.
        SideCordMarketplaceCatalogURL: $(SIDECORD_MARKETPLACE_CATALOG_URL)
        SideCordMarketplacePublicKey: $(SIDECORD_MARKETPLACE_PUBLIC_KEY)
    sources:
      - path: SideCord
        excludes:
          - Resources
          - "UI/OnboardingView 2.swift"
      - path: SideCord/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidecord.app
        PRODUCT_MODULE_NAME: SideCord
        CODE_SIGN_ENTITLEMENTS: SideCord/SideCord.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: SideCordIcns
        ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets:
        - SideCordTests
  SideCordTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SideCordTests
    dependencies:
      - target: SideCord
    settings:
      base:
        PRODUCT_NAME: SideCordTests
        PRODUCT_MODULE_NAME: SideCordTests
        PRODUCT_BUNDLE_IDENTIFIER: com.sidecord.tests
        GENERATE_INFOPLIST_FILE: YES
