<!doctype html>
<html lang="en"><head><meta charset="utf-8"><style>
  *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:"Segoe UI Variable","Segoe UI",sans-serif;color:white}
  #backdrop{position:absolute;inset:0;border:0;background:linear-gradient(90deg,rgb(0 0 0 / 9%),rgb(79 70 229 / 10%),rgb(0 0 0 / 9%));backdrop-filter:brightness(.78)}
  #signin{position:absolute;z-index:2;left:50%;bottom:28px;width:min(390px,calc(100% - 40px));padding:18px;transform:translateX(-50%);text-align:center;border:1px solid rgb(255 255 255 / 13%);border-radius:20px;background:rgb(24 27 35 / 82%);box-shadow:0 18px 60px rgb(0 0 0 / 38%);backdrop-filter:blur(22px)}
  #signin[hidden]{display:none}h2{margin:0;font-size:16px}p{margin:7px 0 13px;color:#b9becb;font-size:12px}button{padding:9px 15px;border:0;border-radius:9px;color:white;background:#5865f2;font-weight:650;cursor:pointer}
</style></head><body><button id="backdrop" aria-label="Finish setup"></button><section id="signin" hidden><h2>Sign in to Discord in SideCord</h2><p>Your persistent Chromium session stays inside SideCord.</p><button id="skip" type="button">Set Up Without Signing In</button></section></body></html>
