<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    #glow { position: absolute; inset: 0; opacity: 0; }
    #glow.left { background: radial-gradient(ellipse at left center, color-mix(in srgb, var(--color) 88%, transparent) 0, color-mix(in srgb, var(--color) 32%, transparent) 25%, transparent 72%); }
    #glow.right { background: radial-gradient(ellipse at right center, color-mix(in srgb, var(--color) 88%, transparent) 0, color-mix(in srgb, var(--color) 32%, transparent) 25%, transparent 72%); }
    #glow.pulse { animation: pulse 1.35s cubic-bezier(.2,.8,.2,1); }
    #glow.subtle { filter: saturate(.85); }
    #glow.strong { filter: saturate(1.3) brightness(1.15); }
    @keyframes pulse { 0% { opacity: 0; transform: scaleY(.18); } 24% { opacity: 1; transform: scaleY(.62); } 58% { opacity: .72; transform: scaleY(.92); } 100% { opacity: 0; transform: scaleY(1); } }
    @media (prefers-reduced-motion: reduce) { #glow.pulse { animation: fade 1.1s ease-out; } @keyframes fade { 0%,100% { opacity: 0; } 25% { opacity: .75; } } }
  </style>
</head>
<body><div id="glow"></div></body>
</html>
