name: SideCord
options:
  bundleIdPrefix: com.sidecord
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: SideCord
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHighResolutionCapable: YES
    INFOPLIST_KEY_NSCameraUsageDescription: SideCord uses the camera only when you start or join a Discord video call.
    INFOPLIST_KEY_NSMicrophoneUsageDescription: SideCord uses the microphone only when you start or join a Discord voice call.
    PRODUCT_NAME: SideCord
targets:
  SideCord:
    type: application
    platform: macOS
    sources:
      - path: SideCord
        excludes:
          - Resources
      - path: SideCord/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidecord.app
        PRODUCT_MODULE_NAME: SideCord
        CODE_SIGN_ENTITLEMENTS: SideCord/SideCord.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets:
        - SideCordTests
  SideCordTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SideCordTests
    dependencies:
      - target: SideCord
    settings:
      base:
        PRODUCT_NAME: SideCordTests
        PRODUCT_MODULE_NAME: SideCordTests
        PRODUCT_BUNDLE_IDENTIFIER: com.sidecord.tests
        GENERATE_INFOPLIST_FILE: YES
